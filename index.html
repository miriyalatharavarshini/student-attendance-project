<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Student Attendance Recording Application</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
<h1>Digital Student Attendance Recording Application</h1>
</header>

<nav class="site-nav">
<a href="#" class="nav-link active" data-tab="home">Home</a>
</nav>

<main class="site-main">

<section id="panel-home" class="panel active">

<div class="welcome-section">
<h2>Student Attendance</h2>
<p>Add and manage student attendance records</p>
</div>

<div class="content-box">

<div class="input-section">
<input type="text" id="studentName" placeholder="Student Name">

<select id="attendanceStatus">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="actions">
<button class="btn btn-primary" id="addBtn">Add</button>
<button class="btn btn-secondary" id="searchBtn">Search</button>
<button class="btn btn-secondary" id="sortBtn">Sort</button>
<button class="btn btn-secondary" id="clearBtn">Clear</button>
</div>

<div class="list-section">
<h3>Attendance List</h3>

<p id="emptyMsg" class="empty-msg">No records added</p>

<ul id="attendanceList"></ul>

<div id="searchResult" class="search-result"></div>

</div>

</div>

</section>

</main>

<footer class="site-footer">
<p>DSA Project - Student Attendance System</p>
</footer>

<script src="script-dsa.js"></script>

</body>
</html>
